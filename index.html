<style>

  #header {
    background: #dde3f8;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #1e4a7a;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #190091; letter-spacing: 0.3px; }
  #header .subtitle { font-size: 12px; color: #4a6a80; margin-top: 2px; }

  #controls {
    background: #dde3f8;
    padding: 8px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #c0b8e8;
    flex-shrink: 0;

    background: #ffffff;

  .stat-item { text-align: center; }
  .stat-val { font-size: 15px; font-weight: 700; color: #190091; }
  .stat-lbl { font-size: 10px; color: #5050a0; text-transform: uppercase; }

  #map { flex: 1; }

  .custom-popup .leaflet-popup-content-wrapper {
    background: #ffffff;
    border: 1px solid #c0b8e8;
    border-radius: 8px;
    color: #1a3a5c;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    padding: 0;
    min-width: 260px;
  }
  .custom-popup .leaflet-popup-tip { background: #ffffff; }
  .custom-popup .leaflet-popup-content { margin: 0; }

  .popup-header {
    background: linear-gradient(135deg, #190091, #2900ED);
    padding: 10px 14px;
    border-radius: 7px 7px 0 0;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .popup-header h3 { font-size: 13px; color: #ffffff; margin-bottom: 3px; line-height: 1.3; }
  .popup-status { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .status-betrieb { background: rgba(41,0,237,0.15); color: #2900ED; border: 1px solid rgba(41,0,237,0.4); }
  .status-planung { background: rgba(236,101,0,0.15); color: #EC6500; border: 1px solid rgba(236,101,0,0.4); }

  .popup-body { padding: 10px 14px; }
  .popup-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 4px 0; border-bottom: 1px solid rgba(25,0,145,0.1); font-size: 12px; }
  .popup-row:last-child { border-bottom: none; }
  .popup-key { color: #4a6a80; flex-shrink: 0; padding-right: 10px; }
  .popup-val { color: #190091; text-align: right; font-weight: 500; }

  .power-bar { height: 4px; background: #e8e8f5; border-radius: 2px; margin-top: 8px; }
  .power-fill { height: 4px; background: linear-gradient(90deg, #EC0000, #EC6500); border-radius: 2px; transition: width 0.3s; }

  .legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    background: rgba(255,255,255,0.97);
    border: 1px solid #c0b8e8;
    border-radius: 8px;
    padding: 12px 14px;
    z-index: 1000;
    font-size: 11px;
    backdrop-filter: blur(6px);
    min-width: 160px;
  }
  .legend h4 { color: #190091; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: #333333; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-size { display: flex; align-items: center; gap: 6px; margin: 4px 0; color: #2a4a6a; }

  .marker-cluster-small { background-color: rgba(41,0,237,0.4); }
  .marker-cluster-small div { background-color: rgba(41,0,237,0.75); color: #fff; }
  .marker-cluster-medium { background-color: rgba(168,5,120,0.4); }
  .marker-cluster-medium div { background-color: rgba(168,5,120,0.75); color: #0d1e2e; }
  .marker-cluster-large { background-color: rgba(236,0,0,0.4); }
  .marker-cluster-large div { background-color: rgba(236,0,0,0.75); color: #0d1e2e; }

  #tooltip {
    position: fixed;
    background: rgba(255,255,255,0.97);
    border: 1px solid #c0b8e8;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #1a3a5c;
    pointer-events: none;
    display: none;
    z-index: 9999;
    max-width: 200px;
  }
</style>

// Populate Bundesland filter
const bundeslaender = [...new Set(RAW_DATA.map(d => d.bundesland).filter(Boolean))].sort();
const blSelect = document.getElementById('filterBL');
bundeslaender.forEach(bl => {
  const opt = document.createElement('option');
  opt.value = bl;
  opt.textContent = bl;
  blSelect.appendChild(opt);
});

let clusterGroup = null;

function getRadius(kw) {
  if (!kw || kw <= 0) return 6;
  const mw = kw / 1000;
  return Math.max(5, Math.min(40, 4 + Math.sqrt(mw) * 1.6));
}

function formatNum(n, unit, divisor = 1) {
  if (!n || n === '') return '—';
  const val = Number(n) / divisor;
  if (isNaN(val)) return '—';
  return val >= 1000 ? (val/1000).toFixed(1) + ' G' + unit : val.toFixed(1) + ' ' + unit;
}

function formatKW(n) {
  if (!n || n === '') return '—';
  const kw = Number(n);
  if (isNaN(kw)) return '—';
  if (kw >= 1000000) return (kw/1000000).toFixed(1) + ' GW';
  if (kw >= 1000) return (kw/1000).toFixed(1) + ' MW';
  return kw.toFixed(0) + ' kW';
}

function formatKWh(n) {
  if (!n || n === '') return '—';
  const kwh = Number(n);
  if (isNaN(kwh)) return '—';
  if (kwh >= 1000000) return (kwh/1000000).toFixed(1) + ' GWh';
  if (kwh >= 1000) return (kwh/1000).toFixed(1) + ' MWh';
  return kwh.toFixed(0) + ' kWh';
}

function getFilteredData() {
  const status = document.getElementById('filterStatus').value;
  const tech = document.getElementById('filterTech').value;
  const bl = document.getElementById('filterBL').value;
  const minKw = Number(document.getElementById('filterLeistung').value);

  return RAW_DATA.filter(d => {
    if (status !== 'all' && d.status !== status) return false;
    if (tech !== 'all' && d.technologie !== tech) return false;
    if (bl !== 'all' && d.bundesland !== bl) return false;
    if (d.netto_kw < minKw) return false;
    return true;
  });
}

function updateStats(data) {
  document.getElementById('stat-count').textContent = data.length.toLocaleString('de');
  const totalKW = data.reduce((s, d) => s + (Number(d.netto_kw) || 0), 0);
  const totalKWh = data.reduce((s, d) => s + (Number(d.kapazitaet_kwh) || 0), 0);
  document.getElementById('stat-leistung').textContent = (totalKW / 1e6).toFixed(2);
  document.getElementById('stat-kapazitaet').textContent = (totalKWh / 1e6).toFixed(2);
}

// Max power for relative bar
const maxKW = Math.max(...RAW_DATA.map(d => Number(d.netto_kw) || 0));

function renderMap() {
  if (clusterGroup) map.removeLayer(clusterGroup);

  clusterGroup = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    iconCreateFunction(cluster) {
      const count = cluster.getChildCount();
      let size = count < 10 ? 'small' : count < 50 ? 'medium' : 'large';
      return L.divIcon({
        html: `<div><span>${count}</span></div>`,
        className: `marker-cluster marker-cluster-${size}`,
        iconSize: [40, 40]
      });
    }
  });

  const data = getFilteredData();
  updateStats(data);

  data.forEach(d => {
    if (!d.lat || !d.lon) return;
    const isInBetrieb = d.status === 'In Betrieb';
    const color = isInBetrieb ? '#2900ED' : '#EC6500';
    const r = getRadius(d.netto_kw);
    const pct = Math.min(100, Math.round((Number(d.netto_kw) || 0) / maxKW * 100));

    const statusClass = isInBetrieb ? 'status-betrieb' : 'status-planung';

    const popupContent = `
      <div class="popup-header">
        <h3>${d.name || 'Unbekannte Anlage'}</h3>
        <span class="popup-status ${statusClass}">${d.status || '—'}</span>
      </div>
      <div class="popup-body">
        <div class="popup-row"><span class="popup-key">Technologie</span><span class="popup-val">${d.technologie || '—'}</span></div>
        <div class="popup-row"><span class="popup-key">Nettoleistung</span><span class="popup-val">${formatKW(d.netto_kw)}</span></div>
        <div class="popup-row"><span class="popup-key">Kapazität</span><span class="popup-val">${formatKWh(d.kapazitaet_kwh)}</span></div>
        <div class="popup-row"><span class="popup-key">Standort</span><span class="popup-val">${d.ort || '—'}${d.bundesland ? '<br><span style="color:#6b8fa8;font-size:10px">' + d.bundesland + '</span>' : ''}</span></div>
        <div class="popup-row"><span class="popup-key">Betreiber</span><span class="popup-val" style="font-size:11px">${d.betreiber || '—'}</span></div>
        <div class="popup-row"><span class="popup-key">Spannungsebene</span><span class="popup-val">${d.spannungsebene || '—'}</span></div>
        <div class="popup-row"><span class="popup-key">Inbetriebnahme</span><span class="popup-val">${d.inbetrieb || '—'}</span></div>
        <div class="power-bar"><div class="power-fill" style="width:${pct}%"></div></div>
      </div>`;

    const marker = L.circleMarker([d.lat, d.lon], {
      radius: r,
      fillColor: color,
      color: 'rgba(255,255,255,0.5)',
      weight: 1,
      opacity: 0.9,
      fillOpacity: isInBetrieb ? 0.75 : 0.55
    });

    marker.bindPopup(popupContent, {
      className: 'custom-popup',
      maxWidth: 300,
      autoPan: true
    });

    clusterGroup.addLayer(marker);
  });

  map.addLayer(clusterGroup);
}

// Bind filter events
['filterStatus','filterTech','filterBL','filterLeistung'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderMap);
});

renderMap();
</script>
</body>
</html>
